<!DOCTYPE html>
<html>
<head>
<title>Unlock Message</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  font-family:sans-serif;
}
.card{
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
}
button{
  background:#d53f8c;
  color:white;
  padding:10px;
  border:none;
  border-radius:10px;
}

@keyframes pop {
  0% { transform: scale(0); }
  100% { transform: scale(1); }
}

#output{
  animation: pop 0.5s ease;
}
</style>
</head>
<body>
<div class="card">
<h2>🔑 Enter Key</h2>
<input type="password" id="key"><br><br>
<button onclick="decode()">Unlock</button>
<p id="output"></p>
</div>
<script type="module" src="script.js"></script>
</body>
</html>
