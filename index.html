<!DOCTYPE html>
<html>
<head>
<title>StegApp 🔐</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#667eea,#764ba2);
  font-family:sans-serif;
}
.card{
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.3);
  text-align:center;
  width:300px;
}
textarea{
  width:90%;
  padding:10px;
  margin:10px;
  border-radius:10px;
}
button{
  background:#764ba2;
  color:white;
  padding:10px;
  border:none;
  border-radius:10px;
}
</style>
</head>
<body>
<div class="card">
<h2>🔐 Encode Message</h2>
<textarea id="msg" placeholder="Enter message"></textarea>
<button onclick="encode()">Next ➡</button>
</div>
<script type="module" src="script.js"></script>
</body>
</html>
